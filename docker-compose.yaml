# ┌──────────────────────────────────────────────────────────────────────────┐
# │ DOCKER COMPOSE: ЛОКАЛЬНАЯ РАЗРАБОТКА                                        │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Запуск: docker-compose up -d
# Остановка: docker-compose down
# Логи: docker-compose logs -f app
# Rebuild: docker-compose up -d --build

version: "3.8"

services:
  # ════════════════════════════════════════════════════════════════════════
  # Kafka (KRaft mode — без Zookeeper)
  # ════════════════════════════════════════════════════════════════════════
  #
  # ПОЧЕМУ KRaft, а не Zookeeper?
  #
  # Исторически Kafka требовала отдельный Zookeeper-кластер для хранения
  # метаданных (список топиков, смещения, конфигурации).
  # KRaft (Kafka Raft) — встроенный консенсус, появившийся в Kafka 3.x:
  # - Один контейнер вместо двух (kafka + zookeeper)
  # - Меньше движущихся частей → меньше точек отказа
  # - Быстрее стартует для локальной разработки
  # - Apache официально задепрекировал Zookeeper в пользу KRaft
  #
  # Образ bitnami/kafka удобен тем, что поддерживает KRaft из коробки
  # через переменные KAFKA_CFG_*.
  kafka:
    image: bitnami/kafka:3.7
    container_name: rts_kafka
    ports:
      # 9092 — порт для клиентов ВНУТРИ Docker-сети (другие контейнеры)
      # 9094 — порт для клиентов СНАРУЖИ Docker-сети (твой Go-код при локальной разработке)
      #
      # ПОЧЕМУ ДВА ПОРТА?
      # Kafka возвращает клиенту адрес брокера для будущих соединений (это называется
      # "advertised listeners"). Если контейнер отдаёт "kafka:9092", то Go-код на
      # твоей машине попытается подключиться к хосту "kafka" — которого не существует
      # вне Docker-сети. Решение: отдельный listener для внешних клиентов с адресом
      # "localhost:9094". Ошибка без этого: "dial tcp: lookup kafka: no such host"
      - "9094:9094"
    environment:
      # KRaft mode: этот брокер одновременно является контроллером
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # LISTENERS — на каких адресах/портах слушает сам брокер
      # PLAINTEXT   — для внутренних контейнеров (app → kafka)
      # EXTERNAL    — для хоста (Go-код при go run ./cmd/app)
      # CONTROLLER  — для KRaft-консенсуса между контроллерами (только внутри)
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093"

      # ADVERTISED LISTENERS — адреса, которые Kafka возвращает клиентам
      # Клиент сначала подключается к bootstrap-серверу, получает список
      # "реальных" адресов брокеров и переподключается к ним.
      # Внутри Docker: kafka:9092 (DNS имя контейнера работает)
      # Снаружи Docker: localhost:9094 (хостовая машина)
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"

      # Маппинг имён протоколов на security-протоколы
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Автоматически создавать топики при первом обращении.
      # В production лучше false — управлять топиками явно (через terraform/helm).
      # Для локальной разработки true = удобно, не нужно ничего создавать вручную.
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Фактор репликации по умолчанию.
      # 1 = нет репликации (нормально для single-node локальной Kafka).
      # В production: минимум 3 брокера, replication.factor=3.
      # Ошибка если поставить 3 при 1 брокере: "InvalidReplicationFactorException"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"

      # Количество партиций по умолчанию для новых топиков.
      # Партиция = единица параллелизма в Kafka.
      # Больше партиций → больше параллельных консьюмеров, но больше overhead.
      # Для нашего проекта 3 партиции достаточно.
      KAFKA_CFG_NUM_PARTITIONS: "3"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      # kafka-topics.sh проверяет что брокер жив и отвечает
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # PostgreSQL
  # ════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: rts_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_time_system
    ports:
      - "5432:5432"
    volumes:
      # Персистентное хранение данных
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Prometheus — сбор метрик
  # ════════════════════════════════════════════════════════════════════════
  #
  # Prometheus работает по принципу PULL: сам ходит к таргетам за метриками.
  # Конфиг prometheus.yml описывает: кого опрашивать и как часто.
  #
  # UI доступен по адресу: http://localhost:9090
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: rts_prometheus
    ports:
      - "9090:9090"
    volumes:
      # Монтируем конфиг
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Персистентное хранение данных метрик
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Retention: хранить метрики 15 дней (для локальной разработки достаточно)
      - "--storage.tsdb.retention.time=15d"
      # Web UI для удобства
      - "--web.enable-lifecycle"  # Позволяет hot-reload конфига через API
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Jaeger — распределённый трейсинг
  # ════════════════════════════════════════════════════════════════════════
  #
  # jaeger-all-in-one = collector + query + UI в одном контейнере.
  # Для production используется jaeger-operator в Kubernetes
  # или отдельные компоненты с Cassandra/Elasticsearch backend.
  #
  # ПОРТЫ:
  # 4317 — OTLP gRPC (наш Go-код отправляет трейсы сюда)
  # 4318 — OTLP HTTP (альтернатива gRPC)
  # 16686 — Jaeger UI (http://localhost:16686)
  #
  # UI доступен по адресу: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.69
    container_name: rts_jaeger
    ports:
      - "4317:4317"   # OTLP gRPC — наш Go-код отправляет трейсы
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI
    environment:
      # Хранилище трейсов.
      # memory — всё в RAM (теряется при рестарте), подходит для разработки.
      # В production: badger (embedded) или elasticsearch.
      SPAN_STORAGE_TYPE: memory
      # Максимальное количество трейсов в памяти (защита от OOM)
      MEMORY_MAX_TRACES: "50000"
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Loki — хранение логов
  # ════════════════════════════════════════════════════════════════════════
  #
  # Loki принимает логи от Promtail и хранит их.
  # Grafana обращается к Loki для отображения логов.
  #
  # В отличие от Elasticsearch, Loki индексирует только labels (metadata),
  # а не содержимое логов. Это дешевле по ресурсам.
  #
  # Порт 3100 — HTTP API (принимает логи, отвечает на запросы Grafana)
  loki:
    image: grafana/loki:3.5.0
    container_name: rts_loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Promtail — агент сбора логов
  # ════════════════════════════════════════════════════════════════════════
  #
  # Promtail читает логи контейнеров через Docker socket и отправляет в Loki.
  #
  # ПОЧЕМУ DOCKER SOCKET?
  # При запуске в контейнере Promtail не видит логи других контейнеров.
  # Монтируем /var/run/docker.sock → Promtail получает доступ к Docker API
  # → находит все контейнеры → читает их stdout/stderr.
  #
  # БЕЗОПАСНОСТЬ: docker.sock = root-доступ к хосту.
  # В production используют Kubernetes DaemonSet с ограниченными правами
  # вместо монтирования docker.sock.
  promtail:
    image: grafana/promtail:3.5.0
    container_name: rts_promtail
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/config.yml:ro
      # Docker socket — для service discovery и чтения логов контейнеров
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Grafana — визуализация
  # ════════════════════════════════════════════════════════════════════════
  #
  # Grafana — единый интерфейс для метрик (Prometheus), трейсов (Jaeger)
  # и логов (Loki). Все три datasource настроены через провижининг.
  #
  # ПРОВИЖИНИНГ:
  # Вместо ручной настройки через UI, конфиги подключаются как файлы.
  # При рестарте настройки сохраняются — не нужно настраивать заново.
  #
  # Логин: admin / admin
  # UI доступен по адресу: http://localhost:3000
  grafana:
    image: grafana/grafana:12.0.0
    container_name: rts_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Отключаем аналитику (не нужна для локальной разработки)
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      # Провижининг datasources (Prometheus, Jaeger, Loki)
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      # Провижининг dashboard-провайдера (путь к JSON-файлам)
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      # Сами JSON-файлы dashboard'ов
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Персистентное хранение (настройки пользователей, аннотации)
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Application (обновлено: добавлены переменные observability)
  # ════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rts_app
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL connection
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_NAME: real_time_system
      POSTGRES_CONNECT_TIMEOUT: 10s
      # HTTP server
      HTTP_PORT: 8080
      HTTP_READ_TIMEOUT: 15s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_IDLE_TIMEOUT: 60s
      HTTP_SHUTDOWN_TIMEOUT: 30s
      # Kafka connection (внутри Docker-сети — PLAINTEXT listener)
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC_ORDERS: "orders"
      # Observability
      # Jaeger OTLP gRPC — внутри Docker-сети: jaeger:4317
      JAEGER_ENDPOINT: "jaeger:4317"
      SERVICE_NAME: "real-time-system"
      TRACING_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rts_network

volumes:
  postgres_data:
  kafka_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  rts_network:
    driver: bridge
