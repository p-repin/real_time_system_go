# ┌──────────────────────────────────────────────────────────────────────────┐
# │ DOCKER COMPOSE: ЛОКАЛЬНАЯ РАЗРАБОТКА                                        │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Запуск: docker-compose up -d
# Остановка: docker-compose down
# Логи: docker-compose logs -f app
# Rebuild: docker-compose up -d --build

version: "3.8"

services:
  # ════════════════════════════════════════════════════════════════════════
  # Kafka (KRaft mode — без Zookeeper)
  # ════════════════════════════════════════════════════════════════════════
  #
  # ПОЧЕМУ KRaft, а не Zookeeper?
  #
  # Исторически Kafka требовала отдельный Zookeeper-кластер для хранения
  # метаданных (список топиков, смещения, конфигурации).
  # KRaft (Kafka Raft) — встроенный консенсус, появившийся в Kafka 3.x:
  # - Один контейнер вместо двух (kafka + zookeeper)
  # - Меньше движущихся частей → меньше точек отказа
  # - Быстрее стартует для локальной разработки
  # - Apache официально задепрекировал Zookeeper в пользу KRaft
  #
  # Образ bitnami/kafka удобен тем, что поддерживает KRaft из коробки
  # через переменные KAFKA_CFG_*.
  kafka:
    image: bitnami/kafka:3.7
    container_name: rts_kafka
    ports:
      # 9092 — порт для клиентов ВНУТРИ Docker-сети (другие контейнеры)
      # 9094 — порт для клиентов СНАРУЖИ Docker-сети (твой Go-код при локальной разработке)
      #
      # ПОЧЕМУ ДВА ПОРТА?
      # Kafka возвращает клиенту адрес брокера для будущих соединений (это называется
      # "advertised listeners"). Если контейнер отдаёт "kafka:9092", то Go-код на
      # твоей машине попытается подключиться к хосту "kafka" — которого не существует
      # вне Docker-сети. Решение: отдельный listener для внешних клиентов с адресом
      # "localhost:9094". Ошибка без этого: "dial tcp: lookup kafka: no such host"
      - "9094:9094"
    environment:
      # KRaft mode: этот брокер одновременно является контроллером
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # LISTENERS — на каких адресах/портах слушает сам брокер
      # PLAINTEXT   — для внутренних контейнеров (app → kafka)
      # EXTERNAL    — для хоста (Go-код при go run ./cmd/app)
      # CONTROLLER  — для KRaft-консенсуса между контроллерами (только внутри)
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093"

      # ADVERTISED LISTENERS — адреса, которые Kafka возвращает клиентам
      # Клиент сначала подключается к bootstrap-серверу, получает список
      # "реальных" адресов брокеров и переподключается к ним.
      # Внутри Docker: kafka:9092 (DNS имя контейнера работает)
      # Снаружи Docker: localhost:9094 (хостовая машина)
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"

      # Маппинг имён протоколов на security-протоколы
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # Автоматически создавать топики при первом обращении.
      # В production лучше false — управлять топиками явно (через terraform/helm).
      # Для локальной разработки true = удобно, не нужно ничего создавать вручную.
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Фактор репликации по умолчанию.
      # 1 = нет репликации (нормально для single-node локальной Kafka).
      # В production: минимум 3 брокера, replication.factor=3.
      # Ошибка если поставить 3 при 1 брокере: "InvalidReplicationFactorException"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"

      # Количество партиций по умолчанию для новых топиков.
      # Партиция = единица параллелизма в Kafka.
      # Больше партиций → больше параллельных консьюмеров, но больше overhead.
      # Для нашего проекта 3 партиции достаточно.
      KAFKA_CFG_NUM_PARTITIONS: "3"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      # kafka-topics.sh проверяет что брокер жив и отвечает
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # PostgreSQL
  # ════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: rts_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_time_system
    ports:
      - "5432:5432"
    volumes:
      # Персистентное хранение данных
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rts_network

  # ════════════════════════════════════════════════════════════════════════
  # Application
  # ════════════════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rts_app
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL connection
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_NAME: real_time_system
      POSTGRES_CONNECT_TIMEOUT: 10s
      # HTTP server
      HTTP_PORT: 8080
      HTTP_READ_TIMEOUT: 15s
      HTTP_WRITE_TIMEOUT: 15s
      HTTP_IDLE_TIMEOUT: 60s
      HTTP_SHUTDOWN_TIMEOUT: 30s
      # Kafka connection
      # Внутри Docker-сети используем PLAINTEXT listener (kafka:9092)
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC_ORDERS: "orders"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rts_network

volumes:
  postgres_data:
  kafka_data:

networks:
  rts_network:
    driver: bridge
