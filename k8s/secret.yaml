# ┌──────────────────────────────────────────────────────────────────────────┐
# │ SECRET: СЕКРЕТНАЯ КОНФИГУРАЦИЯ                                              │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Secret хранит чувствительные данные: пароли, токены, ключи.
#
# ⚠️  ВАЖНО: НЕ КОММИТЬ ЭТОТ ФАЙЛ В GIT С РЕАЛЬНЫМИ СЕКРЕТАМИ!
#
# В production используй:
# - Kubernetes Secrets с External Secrets Operator
# - HashiCorp Vault
# - AWS Secrets Manager / GCP Secret Manager
# - Sealed Secrets (Bitnami)
#
# СОЗДАНИЕ СЕКРЕТА ИЗ КОМАНДНОЙ СТРОКИ (безопаснее):
#   kubectl create secret generic app-secrets \
#     --from-literal=POSTGRES_PASSWORD=your-secure-password \
#     -n real-time-system
#
# ПРИМЕНЕНИЕ ЭТОГО ФАЙЛА (только для dev):
#   kubectl apply -f k8s/secret.yaml -n real-time-system

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: real-time-system
  labels:
    app: real-time-system
type: Opaque
# stringData позволяет писать plain text (Kubernetes сам закодирует в base64)
# Для production используй data: с base64-encoded значениями
stringData:
  # ⚠️  ТОЛЬКО ДЛЯ DEVELOPMENT! В production используй внешний secret manager
  POSTGRES_PASSWORD: "postgres"
